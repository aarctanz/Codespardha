services:
  db:
    image: postgres:18-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${PGUSER:-spring}
      POSTGRES_PASSWORD: ${PGPASSWORD:-spring}
      POSTGRES_DB: ${PGDATABASE:-spring}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
